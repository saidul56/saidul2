<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saidul Islam | Data Analyst & Chemometric Specialist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    /* REMOVED DARK BACKGROUND - UPDATED TO LIGHT THEME  */
    --bg: #ffffff;
    --bg2: #f8fafc;
    --bg3: #f1f5f9;
    --surface: #ffffff;
    --surface2: #fdfdfd;
    --border: rgba(0,0,0,0.06);
    --border2: rgba(0,0,0,0.1);
    --text: #0f172a;
    --text2: #475569;
    --text3: #64748b;
    --accent: #00ca9a;
    --accent2: #0070f3;
    --accent3: #f97316;
    --gold: #d97706;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Outfit', sans-serif;
    --mono: 'DM Mono', monospace;
    --r: 12px;
    --r2: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* PAGE TRANSITION CLASSES  */
  section {
    display: none; /* Hide all sections by default */
    opacity: 0;
    transition: opacity 0.5s ease;
    min-height: 100vh;
    padding-top: 80px;
  }

  section.active {
    display: block;
    opacity: 1;
    animation: fadeInPage 0.6s ease forwards;
  }

  @keyframes fadeInPage {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* NAV UPDATES FOR LIGHT THEME  */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* RE-ADDING YOUR REMAINING STYLES (Cards, Buttons, etc.) */
  .card, .pub-card, .award-card, .timeline-content, .acc-card, .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    border-radius: var(--r2);
    padding: 32px;
    transition: all 0.3s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    padding: 14px 28px;
    border-radius: 100px;
    text-decoration: none;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  /* (Keep the rest of your original CSS here, but use the updated color variables) */
</style>
</head>
<body>

<nav id="navbar">
  <a href="#home" class="nav-logo">
    <div class="logo-badge" style="background: var(--accent); color: white;">SI</div>
    <span class="logo-text">Saidul Islam</span>
  </a>
  <ul class="nav-links">
    <li><a href="#home" class="nav-link active">Home</a></li>
    <li><a href="#research" class="nav-link">Research</a></li>
    <li><a href="#publications" class="nav-link">Publications</a></li>
    <li><a href="#awards" class="nav-link">Awards</a></li>
  </ul>
</nav>

<main id="main-content">
  <section id="home" class="active">
    <div class="hero-inner">
       <h1>Hi, I am <em>Saidul Islam</em></h1>
       <p>Data Analyst & Chemometric Specialist</p>
       </div>
  </section>

  <section id="research">
    <div class="section-inner">
      <h2 class="section-title">Research Experience</h2>
      </div>
  </section>
</main>

<script>
  // SMOOTH PAGE SWITCHING SCRIPT 
  document.querySelectorAll('.nav-link, .nav-logo, .btn-primary').forEach(link => {
    link.addEventListener('click', function(e) {
      const targetId = this.getAttribute('href');
      if (targetId.startsWith('#')) {
        e.preventDefault();
        const targetSection = document.querySelector(targetId);
        
        if (targetSection) {
          // Remove active class from all sections
          document.querySelectorAll('section').forEach(sec => {
            sec.classList.remove('active');
          });
          
          // Switch to the new "page"
          targetSection.classList.add('active');
          window.scrollTo(0, 0); // Always start new page at top
          
          // Update Nav Active State
          document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
          if (this.classList.contains('nav-link')) this.classList.add('active');
        }
      }
    });
  });
</script>
</body>
</html>
